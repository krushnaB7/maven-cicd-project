name: CI/CD for the demo

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - name: checkout code
              uses: actions/checkout@v3
            
            - name: set up jdk 17
              uses: actions/setup-java@v3
              with:
                  java-version: '17'
                  distribution: 'temurin'
            
            - name: Set up Maven
              uses: stCarolas/setup-maven@v5
              with:
                  maven-version: 3.8.2
            
            - name: run tests
              run: run test
    build:
        needs:
          - test
        runs-on: ubuntu-latest

        steps:
            - name: checkout code
              uses: actions/checkout@v3
            
            - name: set up jdk 17
              uses: actions/setup-java@v3
              with:
                  java-version: '17'
                  distribution: 'temurin'
                  
            - name: Set up Maven
              uses: stCarolas/setup-maven@v5
              with:
                  maven-version: 3.8.2

            - name: build a jar
              run: mvn clean package -DskipTests
            
            - name: login to docker hub 
              uses: docker/login-action@v2
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}
            
            - name: build docker image
              run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/demo-latest .

            - name: push docker image
              run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/demo-latest
              